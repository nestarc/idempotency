name: Release

# Publishes @nestarc/idempotency to npm when a tag matching `v*.*.*` is pushed,
# or when the workflow is dispatched manually.
#
# npm Trusted Publisher configuration:
#   - Publisher: GitHub Actions
#   - Repository: nestarc/idempotency
#   - Workflow filename: release.yml
#   - Environment name: npm
#   - Allowed action: npm publish
#
# Flow:
#   1. verify job reads package.json version and confirms it matches the tag.
#   2. build-and-test runs the full prepublishOnly chain as a final safety net.
#   3. publish runs `npm publish --provenance --access public` and creates a
#      GitHub Release with the CHANGELOG excerpt.
#
# Permissions:
#   - id-token: write is required for npm Trusted Publishing and provenance.
#   - contents: write is required to create the GitHub Release.
#
# Security notes:
#   - No `${{ github.event.* }}` or untrusted inputs are referenced. The only
#     templated expressions in `run:` commands come via explicit `env:` blocks
#     (GIT_REF_NAME, PKG_VERSION, VERSION) so shell interpolation sees plain
#     environment variables, never raw template substitution.
#   - The `pack` step proves the tarball is publish-ready BEFORE the
#     irreversible npm publish step.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run the full pipeline but skip the actual npm publish (default: false)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag matches package.json
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Read package version
        id: read
        run: |
          # Read the version field via npm's built-in pkg command (npm 7+).
          # Output is JSON-encoded, so strip the surrounding double quotes.
          VERSION=$(npm pkg get version --workspaces=false | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package.json version: $VERSION"

      - name: Ensure git tag matches package.json (tag-push only)
        if: github.event_name == 'push'
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
          PKG_VERSION: ${{ steps.read.outputs.version }}
        run: |
          TAG_VERSION="${GIT_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GIT_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $GIT_REF_NAME matches package.json $PKG_VERSION"

  build-and-test:
    name: Full prepublishOnly chain
    needs: verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: idempotency_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d idempotency_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Clean + lint + test + build
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/idempotency_test
        run: npm run prepublishOnly

      - name: Pack (dry run)
        run: npm pack --dry-run

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/
            package.json
            README.md
            LICENSE
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to npm
    needs: [verify, build-and-test]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          # npm Trusted Publishing requires npm >= 11.5.1 and Node >= 22.14.0.
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npm publish --provenance --access public --dry-run

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true)
        run: npm publish --provenance --access public

      - name: Extract CHANGELOG entry for this version
        if: github.event_name == 'push'
        id: changelog
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          # Extract the section between `## [X.Y.Z]` and the next `## [`
          # header. The awk regex escapes the literal square brackets —
          # unescaped, `[X.Y.Z]` would be a character class matching ANY
          # single character in {X,.,Y,Z} and the match would fail on a
          # real heading. (This was the v0.1.3 release-body bug.)
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" {flag=1; next}
              flag && /^## \[/ {flag=0}
              flag {print}
            ' CHANGELOG.md > release-body.md
          fi
          if [ ! -s release-body.md ]; then
            echo "Release $VERSION" > release-body.md
            echo "" >> release-body.md
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." >> release-body.md
          fi
          echo "body-file=release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body-file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
