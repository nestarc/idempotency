name: CI

# Runs on every push to main and every pull request targeting main.
#
# Three stages:
#   1. lint  — fast static checks (eslint + type-check). Fails early before
#              burning matrix CI minutes.
#   2. test  — matrix (Node × NestJS) unit + e2e + coverage. Gated behind
#              lint so invalid code never reaches the matrix.
#   3. pack  — clean build + `npm pack --dry-run` to prove the tarball is
#              publish-ready. Single job because the output is identical
#              across the matrix.
#
# Security notes:
#   - No `${{ github.event.* }}` values are interpolated into `run:` shells.
#     The only templated expressions are `${{ matrix.* }}` (trusted, defined
#     in this file) and `${{ github.ref }}` (trusted, from the GitHub runner
#     environment). This avoids the workflow-injection class of bugs.
#   - Default permissions are reduced to `contents: read`.
#   - `concurrency` cancels superseded commits on the same ref.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.json

  test:
    name: Test (Node ${{ matrix.node }} × NestJS ${{ matrix.nestjs }})
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: idempotency_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d idempotency_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      # Let every matrix cell finish so we see which combination broke.
      fail-fast: false
      matrix:
        node: ['20', '22']
        nestjs: ['10', '11']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # For the v10 matrix cell, swap the dev-installed NestJS packages to
      # the v10 major so the unit + e2e suites actually exercise the older
      # runtime. The peer declaration is `^10 || ^11`; without this step we
      # would only verify v11 and the v10 claim would be untested.
      - name: Install NestJS v10 (matrix override)
        if: matrix.nestjs == '10'
        run: |
          npm install --no-save \
            @nestjs/common@^10 \
            @nestjs/core@^10 \
            @nestjs/platform-express@^10 \
            @nestjs/platform-fastify@^10 \
            @nestjs/testing@^10

      - name: Unit tests
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/idempotency_test
        run: npm run test

      - name: E2E tests
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/idempotency_test
        run: npm run test:e2e

      - name: Coverage (primary cell only)
        if: matrix.node == '20' && matrix.nestjs == '11'
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/idempotency_test
        run: npm run test:cov

      - name: Upload coverage artifact
        if: matrix.node == '20' && matrix.nestjs == '11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
          retention-days: 14

  redis-smoke:
    name: Redis smoke
    needs: lint
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Real Redis smoke tests
        env:
          TEST_REDIS_URL: redis://localhost:6379
        run: npm run test:redis

  pack:
    name: Pack (publish dry-run)
    needs: [test, redis-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack (dry run)
        run: npm pack --dry-run

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
